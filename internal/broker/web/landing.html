<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e7ecef">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#101417">
    <title>B2 Share</title>
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/assets/app.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>B2 Share</h1>
          <p class="muted">Share files through Backblaze B2.</p>
        </div>
      </header>

      <main class="landing-grid">
        <section class="upload-panel">
          <h2>Upload</h2>
          <p class="doc-copy">Open the web app to upload one file and get a public unlisted share URL.</p>
          <div class="actions">
            <a class="button primary" href="/share">Open Share</a>
          </div>
        </section>

        <section class="upload-panel">
          <h2>API</h2>
          <p class="doc-copy">Use bearer-token requests for uploads, status polling, history, and deletes.</p>
          <div class="actions">
            <a class="button secondary" href="/docs">Read Docs</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>

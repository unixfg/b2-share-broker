apiVersion: v1
kind: Service
metadata:
  name: b2-share-broker
  namespace: b2-share-broker
  labels:
    app.kubernetes.io/name: b2-share-broker
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: b2-share-broker
    app.kubernetes.io/component: api

---
apiVersion: v1
kind: Service
metadata:
  name: b2-share-processor
  namespace: b2-share-broker
  labels:
    app.kubernetes.io/name: b2-share-broker
    app.kubernetes.io/component: processor
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: b2-share-broker
    app.kubernetes.io/component: processor

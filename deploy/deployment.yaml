apiVersion: apps/v1
kind: Deployment
metadata:
  name: b2-share-broker
  namespace: b2-share-broker
  labels:
    app.kubernetes.io/name: b2-share-broker
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: b2-share-broker
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: b2-share-broker
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      # Optional: pin broker pods to a subset of nodes and spread them for HA.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: kubernetes.io/hostname
      #               operator: In
      #               values:
      #                 - node1.example.invalid
      #                 - node2.example.invalid
      #   podAntiAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #       - weight: 100
      #         podAffinityTerm:
      #           labelSelector:
      #             matchLabels:
      #               app.kubernetes.io/name: b2-share-broker
      #               app.kubernetes.io/component: api
      #           topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: b2-share-broker
              app.kubernetes.io/component: api
      containers:
        - name: api
          # Pin to a digest in production (e.g. :main@sha256:<digest>) so rollouts
          # are explicit. The floating :main tag is convenient for examples.
          image: ghcr.io/unixfg/b2-share-broker:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: b2-share-broker-config
          env:
            - name: B2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: B2_ENDPOINT
            - name: B2_BUCKET
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: B2_BUCKET
            - name: B2_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: B2_PUBLIC_BASE_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: OIDC_CLIENT_SECRET
            - name: SESSION_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: SESSION_AUTH_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: b2-share-broker-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

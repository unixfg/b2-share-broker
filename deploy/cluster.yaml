apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: b2-share-broker-pg
  namespace: b2-share-broker
spec:
  description: "PostgreSQL metadata store for b2-share-broker"
  instances: 3
  enablePDB: false
  failoverDelay: 10
  switchoverDelay: 30
  inheritedMetadata:
    labels:
      app.kubernetes.io/name: b2-share-broker
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  storage:
    size: 10Gi
    # Replace with a storage class available in your cluster.
    storageClass: standard
  enableSuperuserAccess: true
  bootstrap:
    initdb:
      database: b2_share_broker
      owner: b2_share_broker
      secret:
        name: b2-share-broker-db
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      max_connections: "100"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  backup:
    retentionPolicy: "14d"
    barmanObjectStore:
      # Replace with your own backup destination path.
      destinationPath: "s3://your-cnpg-backups/b2-share-broker"
      # Replace with your S3-compatible endpoint.
      endpointURL: "https://s3.example.invalid"
      s3Credentials:
        accessKeyId:
          name: b2-share-broker-b2-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: b2-share-broker-b2-credentials
          key: ACCESS_SECRET_KEY
      data:
        compression: gzip
        encryption: AES256
      wal:
        compression: gzip
        encryption: AES256

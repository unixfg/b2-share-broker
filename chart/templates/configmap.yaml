apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ include "b2-share-broker.namespace" . }}
  labels:
    {{- include "b2-share-broker.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
data:
  PORT: {{ .Values.config.port | quote }}
  OIDC_ISSUER_URL: {{ .Values.config.oidcIssuerUrl | quote }}
  OIDC_CLIENT_ID: {{ .Values.config.oidcClientId | quote }}
  OIDC_AUDIENCE: {{ .Values.config.oidcAudience | quote }}
  OIDC_REQUIRED_ROLES: {{ .Values.config.oidcRequiredRoles | quote }}
  PUBLIC_BASE_URL: {{ .Values.config.publicBaseUrl | quote }}
  PUBLIC_SHARE_CORS_ALLOWED_ORIGINS: {{ .Values.config.publicShareCorsAllowedOrigins | quote }}
  B2_REGION: {{ .Values.config.b2Region | quote }}
  MAX_UPLOAD_BYTES: {{ .Values.config.maxUploadBytes | quote }}
  SESSION_TTL_SECONDS: {{ .Values.config.sessionTtlSeconds | quote }}
  FFMPEG_PATH: {{ .Values.config.ffmpegPath | quote }}
  TRANSCODER_WORK_DIR: {{ .Values.config.transcoderWorkDir | quote }}
  TRANSCODER_POLL_SECONDS: {{ .Values.config.transcoderPollSeconds | quote }}
  STAGING_DIR: {{ .Values.config.stagingDir | quote }}
